<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Tab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page newtab">
    <main id="setup" class="card setup hidden" aria-live="polite">
      <h1>Choose your new tab</h1>
      <p class="muted">
        Claude, Gemini, ChatGPT, Grok, or a custom URL — instead of Edge’s MSN
        feed. Switch anytime from the toolbar icon.
      </p>

      <div id="preset-grid" class="preset-grid" role="radiogroup" aria-label="AI start page"></div>

      <label id="custom-field" class="field hidden">
        <span>Custom URL</span>
        <input
          id="url"
          type="url"
          placeholder="https://example.com"
          autocomplete="url"
          spellcheck="false"
        />
      </label>

      <fieldset class="field">
        <legend>Open mode</legend>
        <label class="radio">
          <input type="radio" name="mode" value="redirect" checked />
          Redirect (recommended)
        </label>
        <label class="radio">
          <input type="radio" name="mode" value="iframe" />
          Embed in tab (only if the site allows framing)
        </label>
      </fieldset>

      <div class="row">
        <button id="save" type="button" class="primary">Save &amp; open</button>
        <button id="options" type="button" class="ghost">Full settings</button>
      </div>

      <p id="error" class="error hidden" role="alert"></p>

      <p class="hint muted">
        Home button / startup page are separate Edge settings — use
        <strong>Settings → Start, home, and new tabs</strong> if you want the
        same URL there.
      </p>
    </main>

    <div id="frame-wrap" class="frame-wrap hidden">
      <iframe
        id="frame"
        title="AI start page"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
      ></iframe>
    </div>

    <script src="shared.js"></script>
    <script src="ui-presets.js"></script>
    <script src="newtab.js"></script>
  </body>
</html>
