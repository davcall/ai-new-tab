<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI New Tab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page popup">
    <main class="popup-card">
      <h1>AI New Tab</h1>
      <p id="current" class="muted small">Loading…</p>

      <div id="preset-grid" class="preset-grid compact" role="radiogroup" aria-label="Quick switch"></div>

      <label id="custom-field" class="field hidden">
        <span>Custom URL</span>
        <input id="url" type="url" placeholder="https://example.com" spellcheck="false" />
      </label>

      <div class="row">
        <button id="save" type="button" class="primary">Apply</button>
        <button id="clear" type="button" class="ghost">Clear</button>
        <button id="settings" type="button" class="ghost">Settings</button>
      </div>

      <p id="status" class="status hidden" role="status"></p>
      <p id="error" class="error hidden" role="alert"></p>
    </main>
    <script src="shared.js"></script>
    <script src="ui-presets.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
